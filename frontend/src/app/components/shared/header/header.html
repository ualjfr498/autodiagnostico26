<header class="header">

  <!-- ── FILA SUPERIOR ── -->
  <div class="header-top">
    <div class="header-top-inner">

      <!-- BUSCADOR (elemento principal) -->
      <div class="search-bar">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="search"
          class="search-input"
          placeholder="Busca tu vehículo, problema o pieza..."
          [(ngModel)]="searchQuery"
          (keyup.enter)="onSearch()"
          aria-label="Buscador principal"
        />
        <button class="search-btn" (click)="onSearch()" aria-label="Buscar">
          Buscar
        </button>
      </div>

      <!-- LOGO (derecha) -->
      <a routerLink="/home" class="header-brand" aria-label="Ir a inicio">
        <img src="logo.png" alt="AutoDiag" class="brand-logo" width="40" height="40" loading="eager"/>
        <span class="brand-name">AutoDiagnostico</span>
      </a>

      <!-- ACCIONES USUARIO -->
      <div class="header-actions">

        <!-- No autenticado -->
        @if (!isLoggedIn) {
          <button class="user-btn" (click)="onLogin()" aria-label="Iniciar sesión">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <div class="user-btn-text">
              <span class="user-btn-title">Mi cuenta</span>
              <span class="user-btn-sub">Iniciar sesión</span>
            </div>
          </button>
        }

        <!-- Autenticado -->
        @if (isLoggedIn) {
          <button class="user-btn" (click)="toggleMenu()"
                  [attr.aria-expanded]="menuOpen" aria-label="Menú de usuario">
            <img [src]="userAvatar" [alt]="userName" class="avatar-img" width="36" height="36"/>
            <div class="user-btn-text">
              <span class="user-btn-title">Mi cuenta</span>
              <span class="user-btn-sub">{{ userName }}</span>
            </div>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5" aria-hidden="true"
                 [class.rotated]="menuOpen">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </button>

          @if (menuOpen) {
            <div class="dropdown" role="menu">
              <a routerLink="/perfil"         class="dropdown-item" role="menuitem">Mi perfil</a>
              <a routerLink="/mis-vehiculos"   class="dropdown-item" role="menuitem">Mis vehículos</a>
              <a routerLink="/seguimiento"     class="dropdown-item" role="menuitem">Seguimiento</a>
              <hr class="dropdown-divider"/>
              <button class="dropdown-item dropdown-item--danger"
                      (click)="onLogout()" role="menuitem">Cerrar sesión</button>
            </div>
          }
        }

      </div>
    </div>
  </div>

  <!-- ── FILA INFERIOR: Navegación como categorías ── -->
  <nav class="header-nav" aria-label="Categorías de navegación">
    <div class="header-nav-inner">
      <a routerLink="/home"          routerLinkActive="nav-item--active" class="nav-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Inicio
      </a>
      <a routerLink="/diagnostico"   routerLinkActive="nav-item--active" class="nav-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Diagnóstico
      </a>
      <a routerLink="/taller"        routerLinkActive="nav-item--active" class="nav-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        Taller
      </a>
      <a routerLink="/repuestos"     routerLinkActive="nav-item--active" class="nav-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Repuestos
      </a>
      <a routerLink="/seguimiento"   routerLinkActive="nav-item--active" class="nav-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Seguimiento
      </a>
      <a routerLink="/presupuesto"   routerLinkActive="nav-item--active" class="nav-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Presupuesto
      </a>
      <a routerLink="/historial"     routerLinkActive="nav-item--active" class="nav-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Historial
      </a>
      <a routerLink="/contacto"      routerLinkActive="nav-item--active" class="nav-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Contacto
      </a>
    </div>
  </nav>

  <!-- Menú móvil -->
  <button class="hamburger" (click)="toggleMobileMenu()"
          [attr.aria-expanded]="mobileMenuOpen" aria-label="Abrir menú">
    <span></span><span></span><span></span>
  </button>

  @if (mobileMenuOpen) {
    <nav class="mobile-nav" aria-label="Menú móvil">
      <a routerLink="/home"        class="mobile-nav-link" (click)="toggleMobileMenu()">Inicio</a>
      <a routerLink="/diagnostico" class="mobile-nav-link" (click)="toggleMobileMenu()">Diagnóstico</a>
      <a routerLink="/taller"      class="mobile-nav-link" (click)="toggleMobileMenu()">Taller</a>
      <a routerLink="/repuestos"   class="mobile-nav-link" (click)="toggleMobileMenu()">Repuestos</a>
      <a routerLink="/seguimiento" class="mobile-nav-link" (click)="toggleMobileMenu()">Seguimiento</a>
      <a routerLink="/presupuesto" class="mobile-nav-link" (click)="toggleMobileMenu()">Presupuesto</a>
      <a routerLink="/historial"   class="mobile-nav-link" (click)="toggleMobileMenu()">Historial</a>
      <a routerLink="/contacto"    class="mobile-nav-link" (click)="toggleMobileMenu()">Contacto</a>
    </nav>
  }

</header>
