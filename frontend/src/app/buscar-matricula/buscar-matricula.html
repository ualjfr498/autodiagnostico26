<section class="buscar-matricula" [formGroup]="vehiculoForm">

  <!-- Encabezado -->
  <div class="encabezado">
    <h2 class="titulo">Información del vehículo (opcional)</h2>
  </div>

  <!-- Info_Car — Fila de inputs -->
  <div class="campos-vehiculo">

    <!-- Matrícula -->
    <div class="campo-grupo">
      <label for="matricula" class="campo-label">Matrícula</label>
      <div class="input-wrapper">
        <span class="input-icono" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5z"/>
            <circle cx="7.5" cy="14.5" r="1.5"/>
            <circle cx="16.5" cy="14.5" r="1.5"/>
          </svg>
        </span>
        <input
          id="matricula"
          class="campo-input placeholder-gris"
          type="text"
          formControlName="matricula"
          placeholder="1234 ABC"
        />
      </div>
    </div>

    <!-- Marca -->
    <div class="campo-grupo">
      <label for="marca" class="campo-label">Marca</label>
      <div class="input-wrapper">
        <input
          id="marca"
          class="campo-input"
          type="text"
          formControlName="marca"
          placeholder="Mini"
        />
      </div>
    </div>

    <!-- Modelo -->
    <div class="campo-grupo">
      <label for="modelo" class="campo-label">Modelo</label>
      <div class="input-wrapper">
        <input
          id="modelo"
          class="campo-input"
          type="text"
          formControlName="modelo"
          placeholder="car"
        />
      </div>
    </div>

  </div>

</section>
